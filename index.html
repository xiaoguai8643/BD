<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>For you</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  :root{
    --bg:#f7f5ef; --surface:#ffffff; --surface2:#efece3; --tertiary:#e7e3d8;
    --text:#2c2c2a; --muted:#5f5e5a; --hint:#888780;
    --info-bg:#e6f1fb; --info-text:#0c447c;
    --success:#3b6d11; --danger:#a32d2d;
    --border:rgba(0,0,0,0.15); --border2:rgba(0,0,0,0.3);
    --radius:8px; --radius-lg:12px;
    --serif:Georgia,'Times New Roman',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:1.5rem;}
  #hunt{width:100%; max-width:560px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem;}
  .topbar p{font-size:13px; color:var(--muted); margin:0; letter-spacing:0.04em;}
  #dots{display:flex; gap:6px;}
  #dots span{width:8px; height:8px; border-radius:50%; background:var(--border2);}
  #card{background:var(--surface2); border-radius:var(--radius-lg); padding:1.75rem;}
  #q-riddle{font-size:17px; line-height:1.9; margin:0 0 1.4rem; color:var(--text); font-family:var(--serif);}
  #map-wrap{display:none; margin:0 0 1.4rem;}
  #map{width:100%; height:260px; border-radius:var(--radius); border:0.5px solid var(--border2);}
  input{width:100%; height:42px; padding:0 12px; font-size:16px; font-family:var(--sans);
    background:var(--surface); border:0.5px solid var(--border2); border-radius:var(--radius);
    margin-bottom:12px; color:var(--text);}
  input:focus{outline:none; box-shadow:0 0 0 3px var(--info-bg);}
  .row{display:flex; align-items:center; gap:12px;}
  button{height:42px; padding:0 20px; font-size:15px; font-family:var(--sans); cursor:pointer;
    background:var(--surface); border:0.5px solid var(--border2); border-radius:var(--radius); color:var(--text);}
  button:hover{background:var(--tertiary);}
  button:active{transform:scale(0.98);}
  button:disabled{opacity:0.4; cursor:not-allowed;}
  #feedback{font-size:14px; color:var(--muted);}
  #lock{display:none; text-align:center; padding:0.5rem 0;}
  #lock h3{font-size:17px; font-weight:500; margin:0 0 8px; color:var(--text);}
  #lock p{font-size:14px; color:var(--muted); margin:0;}
  #countdown{font-size:28px; font-weight:500; font-variant-numeric:tabular-nums; color:var(--info-text); margin:12px 0 0;}
  #final{display:none; background:var(--info-bg); border-radius:var(--radius-lg); padding:2.25rem; text-align:center;}
  #final h2{margin:0 0 14px; font-size:23px; font-weight:500; color:var(--info-text);}
  #final p{font-size:16px; line-height:1.85; margin:0; color:var(--info-text);}
</style>
</head>
<body>
<div id="hunt">

  <div class="topbar">
    <p><span id="qn">i</span> of iii</p>
    <div id="dots"><span data-d="0"></span><span data-d="1"></span><span data-d="2"></span></div>
  </div>

  <div id="card">
    <p id="q-riddle"></p>
    <div id="map-wrap"><div id="map"></div></div>

    <div id="play">
      <input id="answer" type="text" placeholder="&hellip;" autocomplete="off" />
      <div class="row">
        <button id="submit">Answer</button>
        <span id="feedback"></span>
      </div>
    </div>

    <div id="lock">
      <h3>One guess a day. You used today's.</h3>
      <p>Come back when the clock runs out.</p>
      <p id="countdown">24:00:00</p>
    </div>
  </div>

  <div id="final">
    <h2>All three. Of course you did.</h2>
    <p id="final-text"></p>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function(){

  /* ====================== EDIT THESE ====================== */

  var SECRET_RESET_CODE = "RESET-GAJA";   /* type this into the answer box to wipe all progress & locks */

  var FINAL_TEXT = "A 1997 Gaja is waiting at [ YOUR SPOT \u2014 e.g. our kitchen table at 7pm ]. " +
                   "I'm decanting it now. Come find your gift. Happy birthday. \u2014 [ your name ]";

  var LOCK_HOURS = 24;   /* hours locked after a wrong guess */

  var Q = [
    {
      riddle: "They named me for the haze that drinks the autumn sun before it reaches the hill. " +
              "Patience is my only currency: green and biting in youth, I trade tar for roses if you wait long enough. " +
              "The slow ones keep me. The hasty pour me out too soon.",
      answers: ["nebbiolo"],
      map: false
    },
    {
      riddle: "Set the clock back from the turn of the century by three turns of the earth. " +
              "A summer that ran too hot to be cautious. The same season that first announced you to the world. " +
              "Four figures \u2014 give them to me.",
      answers: ["1997","97"],
      map: false
    },
    {
      riddle: "In eighteen fifty-nine a family hung a sign over a village in the fog and, in time, " +
              "painted its own name across every bottle in letters the colour of the wine. " +
              "Stand in the hills below. Whose name flies here?",
      answers: ["gaja"],
      map: true
    }
  ];

  /* ==================== END EDIT ZONE ===================== */

  var STORE_KEY = "giftHuntState_v1";
  var roman = ["i","ii","iii"];
  var lockMs = LOCK_HOURS * 3600 * 1000;
  var mapInit = false;
  var tick = null;

  function load(){
    try { return JSON.parse(localStorage.getItem(STORE_KEY)) || {solved:0, lockUntil:0}; }
    catch(e){ return {solved:0, lockUntil:0}; }
  }
  function save(s){ try{ localStorage.setItem(STORE_KEY, JSON.stringify(s)); }catch(e){} }
  function norm(s){ return (s||"").toLowerCase().replace(/[^a-z0-9]/g,""); }

  function paintDots(cur){
    document.querySelectorAll('[data-d]').forEach(function(el,idx){
      el.style.background = idx < cur ? 'var(--info-text)' : (idx===cur ? 'var(--muted)' : 'var(--border2)');
    });
  }

  function showFinal(){
    document.getElementById('card').style.display='none';
    document.getElementById('final-text').textContent = FINAL_TEXT;
    document.getElementById('final').style.display='block';
    paintDots(3);
  }

  function fmt(ms){
    if(ms<0)ms=0;
    var s=Math.floor(ms/1000), h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
    function p(n){return (n<10?'0':'')+n;}
    return p(h)+':'+p(m)+':'+p(sec);
  }

  function renderLock(s){
    document.getElementById('play').style.display='none';
    document.getElementById('map-wrap').style.display='none';
    document.getElementById('lock').style.display='block';
    function update(){
      var left = s.lockUntil - Date.now();
      if(left<=0){ clearInterval(tick); render(); return; }
      document.getElementById('countdown').textContent = fmt(left);
    }
    update();
    if(tick) clearInterval(tick);
    tick = setInterval(update, 1000);
  }

  function renderRiddle(s){
    var cur = s.solved;
    var q = Q[cur];
    document.getElementById('lock').style.display='none';
    document.getElementById('play').style.display='block';
    document.getElementById('qn').textContent = roman[cur];
    document.getElementById('q-riddle').textContent = q.riddle;
    document.getElementById('answer').value='';
    document.getElementById('feedback').textContent='';
    var mw=document.getElementById('map-wrap');
    mw.style.display = q.map ? 'block' : 'none';
    if(q.map && !mapInit && window.L){
      mapInit=true;
      setTimeout(function(){
        var m=L.map('map').setView([44.72,8.04],10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'\u00a9 OpenStreetMap'}).addTo(m);
        L.marker([44.7233,8.0847]).addTo(m).bindPopup('Barbaresco');
      },200);
    }
    paintDots(cur);
  }

  function render(){
    var s = load();
    if(s.solved >= Q.length){ showFinal(); return; }
    if(s.lockUntil && Date.now() < s.lockUntil){ paintDots(s.solved); renderLock(s); return; }
    if(s.lockUntil){ s.lockUntil=0; save(s); }
    renderRiddle(s);
  }

  document.getElementById('submit').addEventListener('click', function(){
    var raw = document.getElementById('answer').value;
    var val = norm(raw);
    if(!val) return;

    if(norm(raw) === norm(SECRET_RESET_CODE)){
      save({solved:0, lockUntil:0});
      if(tick) clearInterval(tick);
      mapInit=false;
      document.getElementById('feedback').textContent='(reset)';
      render();
      return;
    }

    var s = load();
    if(s.solved >= Q.length){ showFinal(); return; }
    if(s.lockUntil && Date.now() < s.lockUntil){ renderLock(s); return; }

    var ok = Q[s.solved].answers.some(function(a){ return norm(a)===val; });
    var fb = document.getElementById('feedback');

    if(ok){
      fb.textContent='\u2713';
      fb.style.color='var(--success)';
      s.solved += 1;
      s.lockUntil = 0;
      save(s);
      setTimeout(function(){
        fb.style.color='var(--muted)';
        if(s.solved >= Q.length) showFinal();
        else render();
      }, 800);
    } else {
      s.lockUntil = Date.now() + lockMs;
      save(s);
      fb.textContent='No.';
      fb.style.color='var(--danger)';
      setTimeout(function(){ renderLock(s); }, 1000);
    }
  });

  document.getElementById('answer').addEventListener('keydown', function(e){
    if(e.key==='Enter') document.getElementById('submit').click();
  });

  if(window.L){ render(); }
  else { var t=setInterval(function(){ if(window.L){ clearInterval(t); render(); } }, 120); }

})();
</script>
</body>
</html>
